name: skills-integrity

# Anti-drift guardrail for the Seqeron Claude Code skills (docs/skills/STRATEGY.md §5).
# Fast, dependency-free (Python stdlib only — no .NET build): verifies the generated
# tool catalog is in sync with docs/mcp/tools/** and that every relative link in the
# skills + skill-docs resolves.

on:
  push:
    branches: [master]
    paths:
      - '.claude/skills/**'
      - '.github/skills/**'
      - 'docs/skills/**'
      - 'docs/mcp/tools/**'
      - 'scripts/skills/**'
      - '.github/workflows/skills.yml'
  pull_request:
    paths:
      - '.claude/skills/**'
      - '.github/skills/**'
      - 'docs/skills/**'
      - 'docs/mcp/tools/**'
      - 'scripts/skills/**'
      - '.github/workflows/skills.yml'

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Catalog is fresh (no drift vs docs/mcp/tools)
        run: python3 scripts/skills/gen-catalog.py --check
      - name: .github/skills mirrors .claude/skills byte-identically
        run: python3 scripts/skills/sync-github-skills.py --check
      - name: All skill relative links resolve
        run: python3 scripts/skills/check-links.py
